name: CI

on:
  push:
    branches: [main]

jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Java
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Grant execute permission
          run: chmod +x ./mvnw

        - name: Build and Test
          run: ./mvnw clean verify